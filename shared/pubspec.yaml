version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.5
  api_state: ^1.0.0
  fpdart: ^1.1.0
  intl: ^0.19.0
  http: ^1.2.0
  hive_flutter: ^1.1.0
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  go_router: ^13.2.0
  permission_handler: ^11.3.0
  stream_chat_flutter: ^8.0.0
  hmssdk_flutter: ^1.11.1
  collection: ^1.18.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0
  logger: ^2.4.0

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mocktail: ^0.3.0

