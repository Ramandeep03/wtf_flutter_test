name: trainer_app
description: Trainer-facing Flutter app. Talks to backend over HTTP only — no firebase_auth / cloud_firestore.
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  api_state: ^1.0.0
  stream_chat_flutter: ^8.0.0
  hmssdk_flutter: ^1.9.9
  flutter_local_notifications: ^20.1.0
  hive_flutter: ^1.1.0
  go_router: ^13.2.0
  fpdart: ^1.1.0
  http: ^1.2.0
  uuid: ^4.3.3
  intl: ^0.19.0
  permission_handler: ^11.3.0
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0
  shared:
    path: ../shared

dev_dependencies:
  bloc_test: ^9.1.5
  mocktail: ^0.3.0
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

# stream_chat_flutter pulls in image_gallery_saver_plus 3.x which still
# references the v1-embedding `Registrar` class that Flutter removed.
# Force the v2-embedding 4.x version transitively.
dependency_overrides:
  image_gallery_saver_plus: ^4.0.1

flutter:
  uses-material-design: true
