org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin 2.x compile daemon — bumping heap fixes "daemon terminated unexpectedly
# on startup attempt #1 with error code: 0" on JDK 21 + AGP 8.11 + Kotlin 2.2.x.
kotlin.daemon.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m

# Fallback if the daemon still flakes: uncomment to compile in-process.
# kotlin.compiler.execution.strategy=in-process
