name: guru_app
description: Guru-facing Flutter app. Talks to backend over HTTP only — no firebase_auth / cloud_firestore.
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  api_state: ^1.0.0
  stream_chat_flutter: ^8.0.0
  hmssdk_flutter: ^1.9.9
  flutter_local_notifications: ^17.2.2
  hive_flutter: ^1.1.0
  go_router: ^13.2.0
  fpdart: ^1.1.0
  http: ^1.2.0
  uuid: ^4.3.3
  intl: ^0.19.0
  permission_handler: ^11.3.0
  timezone: ^0.9.2
  flutter_timezone: ^2.0.0
  lottie: ^3.0.0
  shared:
    path: ../shared

dev_dependencies:
  bloc_test: ^9.1.5
  mocktail: ^0.3.0
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
